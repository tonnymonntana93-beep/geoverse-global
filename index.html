<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>GeoVerse Neo-Noir</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
      body { 
        margin: 0; padding: 0; background-color: #0d001a; color: white; overflow: hidden;
        font-family: 'Press Start 2P', cursive;
        image-rendering: pixelated; /* Wymusza ostrość pikseli */
      }
      /* Dostosowanie dymków Leaflet */
      .leaflet-popup-content-wrapper { background: #0d001a !important; border: 4px solid #a855f7 !important; border-radius: 0 !important; color: white !important; font-family: 'Press Start 2P', cursive !important; box-shadow: 8px 8px 0px black !important; }
      .leaflet-popup-tip { background: #a855f7 !important; }
      .leaflet-container { background: #0d001a !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
