name: GeoVerse Global Release

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install dependencies
        run: npm install
        
      - name: Build Web Version
        run: npm run build
        
      - name: Capacitor Android Setup
        run: |
          npx cap init GeoVerse com.geoverse.global --web-dir dist
          npx cap add android || true
          npx cap sync android
          
      - name: Inject GPS Permissions
        run: |
          # Ten krok automatycznie dodaje uprawnienia GPS do wygenerowanego projektu Androida
          sed -i '/<application/i \    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-feature android:name="android.hardware.location.gps" />' android/app/src/main/AndroidManifest.xml

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Compile Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GeoVerse-Android-Fix
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
