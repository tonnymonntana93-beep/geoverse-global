name: GeoVerse Neo-Noir Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web App
        run: npm run build

      - name: Capacitor Sync & Patch
        run: |
          npx cap init GeoVerse com.geoverse.global --web-dir dist || true
          # Usuwamy stary folder android, aby wymusić czystą strukturę
          rm -rf android
          npx cap add android
          
          # Automatyczne wstrzyknięcie uprawnień GPS do Manifestu
          # Dzięki temu nie musisz ręcznie edytować plików w folderze android
          sed -i '/<application/i \    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-feature android:name="android.hardware.location.gps" />' android/app/src/main/AndroidManifest.xml
          
          npx cap sync android

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GeoVerse-NeoNoir-v1
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
