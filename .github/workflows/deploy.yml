name: GeoVerse Force Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build React App
        run: npm run build

      - name: Capacitor Setup
        run: |
          npx cap init GeoVerse com.geoverse.app --web-dir dist || true
          # Usuwamy stary folder android, aby uniknąć konfliktów plików
          rm -rf android
          npx cap add android
          
          # Ręczne wstrzyknięcie uprawnień do nowo wygenerowanego Manifestu
          # To rozwiązuje błąd "Missing permissions", który widziałeś wcześniej
          sed -i '/<application/i \    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-feature android:name="android.hardware.location.gps" />' android/app/src/main/AndroidManifest.xml
          
          npx cap sync android

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GeoVerse-Final-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
