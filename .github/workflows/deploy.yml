name: GeoVerse GPS Fix Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Capacitor Sync
        run: |
          npx cap init GeoVerse com.geoverse.global --web-dir dist || true
          # Jeśli folder android nie istnieje, stwórz go
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          # Kopiujemy Twój ręcznie stworzony Manifest do folderu budowania
          # To zapobiega błędom "Missing permissions"
          cp android/app/src/main/AndroidManifest.xml android/app/src/main/AndroidManifest.xml.bak || true
          npx cap sync android
          # Przywracamy Twój manifest po synchronizacji
          mv android/app/src/main/AndroidManifest.xml.bak android/app/src/main/AndroidManifest.xml || true

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GeoVerse-GPS-Fixed
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
