name: GeoVerse Ultimate Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # To wymusza nowszy silnik i usuwa Twoje ostrzeżenie
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web App
        run: npm run build

      - name: Verify Build
        run: |
          if [ ! -d "dist" ]; then
            echo "BŁĄD: Folder 'dist' nie powstał! Sprawdź błędy w kodzie React/Vite."
            exit 1
          fi

      - name: Capacitor Android Sync
        run: |
          npx cap init GeoVerse com.geoverse.global --web-dir dist || true
          # Usuwamy stary folder android, by uniknąć konfliktów przy przebudowie
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          # Flaga --no-daemon pomaga w środowiskach CI
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GeoVerse-Ready-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
